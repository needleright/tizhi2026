<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>中医体质辨识报告</title>
    <style>
        :root { --primary-color: #8B4513; --accent-color: #d32f2f; }
        body { font-family: "Microsoft YaHei", sans-serif; background: #f4f1ea; color: #333; margin: 0; padding: 15px; }
        .container { max-width: 700px; margin: 0 auto; background: white; padding: 20px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        
        /* 问卷样式 */
        .question-group { margin-bottom: 20px; padding: 15px; border-radius: 12px; background: #fffcf9; border: 1px solid #f0e6dc; }
        .question-title { font-weight: bold; font-size: 17px; margin-bottom: 12px; display: block; color: #5d4037; }
        .options { display: flex; justify-content: space-between; }
        .option-item { flex: 1; text-align: center; }
        .option-item input { width: 20px; height: 20px; }
        .option-item label { display: block; font-size: 11px; color: #888; margin-top: 5px; }

        /* 体质占比展示 */
        .constitution-bar { margin: 15px 0; }
        .constitution-label { font-size: 12px; color: #666; margin-bottom: 3px; display: block; }
        .constitution-progress { height: 10px; border-radius: 5px; background: #e0e0e0; overflow: hidden; }
        .constitution-fill { height: 100%; border-radius: 5px; background: linear-gradient(to right, #8B4513, #d32f2f); }

        /* 结果页面样式 */
        #resultArea { display: none; animation: fadeIn 0.8s ease; }
        .report-card { background: linear-gradient(135deg, #fffcf5 0%, #f7eee2 100%); border-radius: 15px; padding: 25px; border: 1px solid #e0c0a0; position: relative; overflow: hidden; }
        .report-card::before { content: "体质辨识报告"; position: absolute; top: 10px; right: -30px; background: #d32f2f; color: white; padding: 5px 40px; transform: rotate(45deg); font-size: 12px; }
        .main-constitution { font-size: 28px; color: #8B4513; font-weight: bold; text-align: center; margin: 10px 0; }
        .core-constitution { background: #fff8f5; border-radius: 10px; padding: 15px; margin: 15px 0; border: 1px dashed #d32f2f; }
        .core-constitution h3 { color: #d32f2f; text-align: center; margin: 0; }
        .intervention-points { background: white; border-radius: 10px; padding: 15px; margin: 15px 0; border: 1px solid #eee; }
        .intervention-points h4 { margin: 0 0 8px 0; color: #8B4513; font-size: 15px; display: flex; align-items: center; }
        .intervention-points ul { padding-left: 20px; margin: 10px 0; }
        .intervention-points li { margin-bottom: 8px; line-height: 1.4; }
        .advice-section { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .advice-box { background: white; padding: 15px; border-radius: 10px; border: 1px solid #eee; }
        .advice-box h4 { margin: 0 0 8px 0; color: #8B4513; font-size: 15px; display: flex; align-items: center; }
        
        .submit-btn { width: 100%; padding: 18px; background: #8B4513; color: white; border: none; border-radius: 10px; font-size: 20px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .submit-btn:hover { background: #5d4037; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="container" id="mainContainer">
    <div id="quizSection">
        <h1 style="text-align: center; color: #8B4513;">中医体质辨识</h1>
        <p style="text-align: center; color: #999; font-size: 13px;">依据 GB/T 46939-2025 国标标准</p>
        <form id="quizForm">
            <div id="questionsContainer"></div>
            <button type="button" class="submit-btn" onclick="generateReport()">开始体质辨识</button>
        </form>
    </div>

    <div id="resultArea">
        <div class="report-card">
            <div style="text-align: center; color: #666; font-size: 14px;">辨识结果：您的核心体质为</div>
            <div id="targetConstitution" class="main-constitution">加载中...</div>
            
            <div class="core-constitution">

            </div>
            
            <div class="intervention-points" id="interventionContent">

                <div id="constitutionBars"></div>
            </div>

            <div class="advice-section">

            <img src="my-qr.png" style="width: 150px; border-radius: 10px; border: 4px solid white; box-shadow: 0 5px 15px rgba(0,0,0,0.1);">
            <p style="font-size: 12px; color: #999;">长按识别二维码，联系管家领取完整调理方案</p>
            <button onclick="location.reload()" style="margin-top: 15px; background: none; border: 1px solid #ccc; padding: 5px 15px; border-radius: 20px; font-size: 12px;">重新测评</button>
        </div>
    </div>
</div>

    // 4. 体质判定函数
    function calculateConstitutionScores() {
        const scores = { "平和": 0, "气虚": 0, "阳虚": 0, "阴虚": 0, "痰湿": 0, "湿热": 0, "血瘀": 0, "气郁": 0, "特禀": 0 };
        const counts = { 
            "平和": 4, "气虚": 3, "阳虚": 3, "阴虚": 3, "痰湿": 3, "湿热": 3, "血瘀": 3, "气郁": 3, "特禀": 3 
        };

        // 处理每个问题
        questions.forEach(q => {
            const value = parseInt(document.querySelector(`input[name="q${q.id}"]:checked`).value);
            const adjustedValue = q.reverse ? (6 - value) : value;
            
            q.types.forEach(t => {
                scores[t] += adjustedValue;
            });
        });

        // 计算转化分数
        const convertedScores = {};
        for (const type in scores) {
            const rawScore = scores[type];
            const count = counts[type];
            const convertedScore = ((rawScore - count) / (count * 4)) * 100;
            convertedScores[type] = convertedScore;
        }

        return convertedScores;
    }

    // 5. 体质判定函数
    function determineConstitution(scores) {
        let coreConstitution = "平和";
        let coreScore = -1;
        
        // 检查平和质条件
        if (scores["平和"] >= 60 && 
            scores["气虚"] < 30 && 
            scores["阳虚"] < 30 && 
            scores["阴虚"] < 30 && 
            scores["痰湿"] < 30 && 
            scores["湿热"] < 30 && 
            scores["血瘀"] < 30 && 
            scores["气郁"] < 30 && 
            scores["特禀"] < 30) {
            return { type: "平和", score: scores["平和"] };
        }
        
        // 检查偏颇体质
        for (const type in scores) {
            if (type === "平和") continue;
            
            if (scores[type] >= 40) {
                // 检查其他体质是否都低于30
                const otherScores = Object.keys(scores).filter(t => t !== type);
                const othersBelow30 = otherScores.every(t => scores[t] < 30);
                
                if (othersBelow30) {
                    return { type: type, score: scores[type] };
                }
            }
        }
        
        // 如果没有符合的，返回得分最高的体质
        let maxScore = -1;
        for (const type in scores) {
            if (scores[type] > maxScore) {
                maxScore = scores[type];
                coreConstitution = type;
            }
        }
        
        return { type: coreConstitution, score: maxScore };
    }

    // 6. 生成体质报告
    function generateReport() {
        const form = document.getElementById('quizForm');
        if (!form.checkValidity()) { 
            alert("请完成所有题目以便进行体质辨识");
            return; 
        }

        // 计算体质分数
        const scores = calculateConstitutionScores();
        
        // 确定核心体质
        const result = determineConstitution(scores);
        const coreType = result.type;
        
        // 显示体质占比
        displayConstitutionBars(scores);
        
        // 填充页面
        document.getElementById('quizSection').style.display = 'none';
        document.getElementById('resultArea').style.display = 'block';
        document.getElementById('targetConstitution').innerText = coreType + "质";
        document.getElementById('foodAdvice').innerText = constitutionIntervention[coreType].food;
        document.getElementById('sportAdvice').innerText = constitutionIntervention[coreType].sport;
        
        // 显示核心干预要点
        displayInterventionPoints(coreType);
        
        window.scrollTo(0, 0);
    }

    // 7. 显示体质占比
    function displayConstitutionBars(scores) {
        const container = document.getElementById('constitutionBars');
        container.innerHTML = '';
        
        const sortedConstitutions = Object.entries(scores)
            .sort((a, b) => b[1] - a[1])
            .map(([type, score]) => ({ type, score }));
        
        sortedConstitutions.forEach(item => {
            const bar = document.createElement('div');
            bar.className = 'constitution-bar';
            
            const label = document.createElement('div');
            label.className = 'constitution-label';
            label.textContent = `${item.type}质: ${item.score.toFixed(1)}%`;
            
            const progress = document.createElement('div');
            progress.className = 'constitution-progress';
            
            const fill = document.createElement('div');
            fill.className = 'constitution-fill';
            fill.style.width = `${Math.min(item.score, 100)}%`;
            
            progress.appendChild(fill);
            bar.appendChild(label);
            bar.appendChild(progress);
            container.appendChild(bar);
        });
    }

        const content = constitutionIntervention[coreType];
        const interventionContainer = document.getElementById('interventionContent');
        
        // 清空现有内容
        interventionContainer.innerHTML = '';
        
        // 创建标题
        const title = document.createElement('h3');
        title.textContent = content.title;
        title.style.color = '#d32f2f';
        title.style.textAlign = 'center';
        title.style.marginBottom = '10px';
        
        // 创建摘要
        const summary = document.createElement('p');
        summary.textContent = content.summary;
        summary.style.textAlign = 'center';
        summary.style.color = '#555';
        summary.style.margin = '10px 0';
        
        // 创建要点列表
        const pointsList = document.createElement('ul');
        content.keyPoints.forEach(point => {
            const li = document.createElement('li');
            li.textContent = point;
            pointsList.appendChild(li);
        });
        
        // 组装内容
        interventionContainer.appendChild(title);
        interventionContainer.appendChild(summary);
        interventionContainer.appendChild(pointsList);
    }
</script>
</body>
</html>
