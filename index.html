<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>中医体质辨识自测系统 (GB/T 46939-2025)</title>
    <style>
        :root { --primary-color: #8B4513; --bg-color: #FDF5E6; }
        body { font-family: "Microsoft YaHei", sans-serif; background-color: var(--bg-color); color: #333; margin: 0; padding: 15px; line-height: 1.6; }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: var(--primary-color); font-size: 22px; border-bottom: 2px solid var(--primary-color); padding-bottom: 10px; margin-top: 0; }
        .intro { background: #fff9f0; padding: 12px; border-radius: 8px; font-size: 14px; margin-bottom: 20px; color: #666; text-align: center; }
        .question-group { margin-bottom: 20px; padding: 15px; border: 1px solid #f0f0f0; border-radius: 10px; }
        .question-title { font-weight: bold; font-size: 17px; margin-bottom: 15px; display: block; color: #444; }
        .options { display: flex; justify-content: space-between; gap: 5px; }
        .option-item { flex: 1; text-align: center; position: relative; }
        .option-item input { width: 22px; height: 22px; cursor: pointer; margin-bottom: 5px; }
        .option-item label { display: block; font-size: 12px; color: #666; cursor: pointer; white-space: nowrap; }
        .submit-btn { display: block; width: 100%; padding: 15px; background: var(--primary-color); color: white; border: none; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 20px; }
        #resultArea { display: none; margin-top: 30px; padding: 25px; background: #fffcf5; border: 2px solid #8B4513; border-radius: 15px; }
        .constitution-item { margin-bottom: 8px; font-size: 15px; border-bottom: 1px dashed #eee; padding-bottom: 5px; }
        .high-light { color: #d32f2f; font-weight: bold; }
        @media (max-width: 480px) { .option-item label { font-size: 11px; transform: scale(0.9); } }
    </style>
</head>
<body>

<div class="container">
    <h1>社区居民中医体质辨识自测</h1>
    <p class="intro">依据 GB/T 46939-2025 标准<br>请根据您<strong>近一年</strong>的真实感受回答</p>
    
    <form id="quizForm">
        <div id="questionsContainer"></div>
        <button type="button" class="submit-btn" onclick="calculateResult()">生成辨识报告</button>
    </form>

    <div id="resultArea">
        <h2 style="color: #8B4513; text-align: center; margin-top: 0;">🔍 您的辨识报告</h2>
        <div id="scoreDetails" style="background: white; padding: 15px; border-radius: 8px; border: 1px solid #f0e0d0;"></div>

        <div style="margin-top: 25px; text-align: center; border-top: 2px dashed #e0c0a0; padding-top: 20px;">
            <p style="color: #d32f2f; font-weight: bold; font-size: 18px; margin: 0;">🎁 获取专属调理方案</p>
            <p style="color: #666; font-size: 14px; margin: 10px 0;">请【截图保存】上方分数，扫码咨询管家</p>
            
            <div style="margin: 15px auto; width: 180px; padding: 10px; background: white; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); border: 1px solid #eee;">
                <img src="my-qr.png" alt="微信二维码" style="width: 100%; height: auto; display: block;">
            </div>

            <p style="color: #8B4513; font-size: 14px; font-weight: bold;">[ 社区健康管家 · 竭诚为您服务 ]</p>
        </div>

        <div style="margin-top: 20px; display: flex; gap: 10px; justify-content: center;">
            <button onclick="window.print()" style="padding: 8px 15px; border-radius: 5px; border: 1px solid #ccc; background: white;">打印</button>
            <button onclick="location.reload()" style="padding: 8px 15px; border-radius: 5px; border: none; background: #8B4513; color: white;">重新测</button>
        </div>
    </div>
</div>

<script>
    // 标准选项描述
    const optionLabels = ["没有", "很少", "有时", "经常", "总是"];

    const questions = [
        {id: 1, text: "您精力充沛吗？", types: ["平和"]},
        {id: 2, text: "您容易疲乏吗？", types: ["平和", "气虚"]},
        {id: 3, text: "您感到闷闷不乐、情绪低沉吗？", types: ["平和", "气郁"]},
        {id: 4, text: "您比一般人耐受不了寒冷吗？", types: ["平和", "阳虚"]},
        {id: 5, text: "您容易气短（接不上气）吗？", types: ["气虚"]},
        {id: 6, text: "您容易心慌吗？", types: ["气虚"]},
        {id: 7, text: "您胃部、背部或腰膝部怕冷吗？", types: ["阳虚"]},
        {id: 8, text: "您怕冷、衣服比别人穿得多吗？", types: ["阳虚"]},
        {id: 9, text: "您感觉身体、脸上发热吗？", types: ["阴虚"]},
        {id: 10, text: "您皮肤或口唇干吗？", types: ["阴虚"]},
        {id: 11, text: "您面部两颧发红吗？", types: ["阴虚"]},
        {id: 12, text: "您感到身体沉重、不爽快吗？", types: ["痰湿"]},
        {id: 13, text: "您腹部肥满松软吗？", types: ["痰湿"]},
        {id: 14, text: "您嘴里有黏黏的感觉吗？", types: ["痰湿"]},
        {id: 15, text: "您面部或鼻部油腻发光吗？", types: ["湿热"]},
        {id: 16, text: "您小便时尿道有发热感或尿色深吗？", types: ["湿热"]},
        {id: 17, text: "您白带发黄/阴囊部位潮湿吗？", types: ["湿热"]},
        {id: 18, text: "您身体上有哪里疼痛吗？", types: ["血瘀"]},
        {id: 19, text: "您面面色晦暗或容易出现褐斑吗？", types: ["血瘀"]},
        {id: 20, text: "您口唇颜色偏暗吗？", types: ["血瘀"]},
        {id: 21, text: "您容易精神紧张、焦虑不安吗？", types: ["气郁"]},
        {id: 22, text: "您多愁善感、感情脆弱吗？", types: ["气郁"]},
        {id: 23, text: "您没感冒也会打喷嚏吗？", types: ["特禀"]},
        {id: 24, text: "您容易过敏（药物/食物/花粉等）吗？", types: ["特禀"]},
        {id: 25, text: "您的皮肤容易起荨麻疹或一抓就红吗？", types: ["特禀"]}
    ];

    const container = document.getElementById('questionsContainer');
    questions.forEach((q, index) => {
        const html = `
            <div class="question-group">
                <span class="question-title">${index + 1}. ${q.text}</span>
                <div class="options">
                    ${[1, 2, 3, 4, 5].map(v => `
                        <div class="option-item">
                            <input type="radio" name="q${q.id}" value="${v}" id="q${q.id}_${v}" required>
                            <label for="q${q.id}_${v}">${optionLabels[v-1]}</label>
                        </div>
                    `).join('')}
                </div>
            </div>`;
        container.insertAdjacentHTML('beforeend', html);
    });

    function calculateResult() {
        const form = document.getElementById('quizForm');
        if (!form.checkValidity()) {
            alert("请回答完所有问题哦！");
            return;
        }

        const scores = { "平和": 0, "气虚": 0, "阳虚": 0, "阴虚": 0, "痰湿": 0, "湿热": 0, "血瘀": 0, "气郁": 0, "特禀": 0 };
        const counts = { "平和": 4, "气虚": 3, "阳虚": 3, "阴虚": 3, "痰湿": 3, "湿热": 3, "血瘀": 3, "气郁": 3, "特禀": 3 };

        questions.forEach(q => {
            let val = parseInt(document.querySelector(`input[name="q${q.id}"]:checked`).value);
            q.types.forEach(type => {
                if (type === "平和" && [2, 3, 4].includes(q.id)) {
                    scores[type] += (6 - val);
                } else {
                    scores[type] += val;
                }
            });
        });

        let results = [];
        for (let type in scores) {
            let convertScore = ((scores[type] - counts[type]) / (counts[type] * 4) * 100).toFixed(1);
            results.push({ name: type, score: parseFloat(convertScore) });
        }

        document.getElementById('resultArea').style.display = 'block';
        let html = "<p style='font-weight:bold; color:#8B4513; margin-bottom:10px;'>测评得分如下：</p>";
        
        results.forEach(res => {
            let status = "";
            if (res.name !== "平和") {
                if (res.score >= 40) status = "<span class='high-light'>【确认为该体质】</span>";
                else if (res.score >= 30) status = "<span style='color:#e6a23c'>【倾向是】</span>";
            }
            html += `<div class="constitution-item">${res.name}质：${res.score}分 ${status}</div>`;
        });
        
        document.getElementById('scoreDetails').innerHTML = html;
        window.scrollTo({ top: document.getElementById('resultArea').offsetTop, behavior: 'smooth' });
    }
</script>
</body>
</html>
